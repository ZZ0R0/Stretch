# Benchmark V1 — 50k neurones KNN 3D (1000 ticks)

[domain]
topology = "knn_3d"
size = 50000
k_neighbors = 10
domain_extent = 200.0
seed = 42

[node_defaults]
activation = 0.0
threshold = 0.2
fatigue = 0.0
memory_trace = 0.0
excitability = 1.0
inhibition = 0.0

[edge_defaults]
conductance = 1.0
plasticity = 1.0
decay = 0.01
conductance_min = 0.1
conductance_max = 5.0

[propagation]
kernel = "exponential"
spatial_decay = 0.15
gain = 0.6

[plasticity]
reinforcement_rate = 0.01
weakening_rate = 0.002
coactivation_threshold = 0.2
coactivity_decay = 0.05

[dissipation]
activation_decay = 0.25
fatigue_gain = 0.20
fatigue_recovery = 0.05
inhibition_gain = 0.12
inhibition_decay = 0.03
trace_decay = 0.005
trace_gain = 0.1
activation_min = 0.01
decay_jitter = 0.15

[simulation]
total_ticks = 1000
snapshot_interval = 10
seed = 42

[[stimuli]]
node = 25000
start_tick = 10
end_tick = 15
intensity = 1.5
repeat_interval = 0
